name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-e-testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instala dependencias
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (pyflakes)
        run: ruff check src dashboard tests --select F

      - name: Testes
        run: pytest -q
